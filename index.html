<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Botokol AI</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Inter',sans-serif;
  background:#fff;
  color:#111;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
}

.logo{
  font-weight:800;
}

.lang button{
  margin-left:10px;
  padding:6px 12px;
  border:1px solid #ddd;
  background:#fff;
  cursor:pointer;
  border-radius:6px;
}

/* HERO */
.hero{
  text-align:center;
  padding:80px 20px;
  max-width:900px;
  margin:auto;
}

.hero h1{
  font-size:48px;
  font-weight:800;
}

.hero p{
  color:#666;
  margin-top:15px;
  font-size:18px;
}

/* BUTTON */
.btn{
  margin-top:25px;
  background:#FFD600;
  border:none;
  padding:16px 30px;
  font-weight:600;
  font-size:18px;
  border-radius:10px;
  cursor:pointer;
}

/* DEMO BOX */
.demo{
  margin-top:40px;
  background:#f5f5f5;
  padding:20px;
  border-radius:14px;
  text-align:left;
  max-width:500px;
  margin-left:auto;
  margin-right:auto;
}

.demo audio{
  width:100%;
  margin-top:10px;
}

/* STEPS */
.steps{
  padding:80px 20px;
  text-align:center;
}

.step-box{
  display:flex;
  gap:20px;
  justify-content:center;
  flex-wrap:wrap;
}

.card{
  width:250px;
  background:#fafafa;
  padding:20px;
  border-radius:12px;
}

/* CTA */
.cta{
  text-align:center;
  padding:80px 20px;
  background:#fff8cc;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">Botokol</div>
  <div class="lang">
    <button onclick="setLang('ru')">RU</button>
    <button onclick="setLang('en')">EN</button>
    <button onclick="setLang('he')">HE</button>
  </div>
</div>

<div class="hero">
  <h1 id="title"></h1>
  <p id="desc"></p>
  <button class="btn" id="btn"></button>

  <div class="demo">
    📞 Call demo<br><br>
    Client: Hello?<br>
    Bot: Hi, I’m calling about your request...

    <audio controls>
      <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
    </audio>
  </div>
</div>

<div class="steps">
  <h2 id="how"></h2>
  <div class="step-box">
    <div class="card" id="s1"></div>
    <div class="card" id="s2"></div>
    <div class="card" id="s3"></div>
  </div>
</div>

<div class="cta">
  <h2 id="cta"></h2>
  <button class="btn" id="ctaBtn"></button>
</div>

<script>
const t = {
ru:{
title:"Робот звонит клиентам и приводит встречи",
desc:"Автоматически общается и записывает клиентов",
btn:"Получить звонок",
how:"Как это работает",
s1:"📂 Загружаешь контакты",
s2:"🤖 Робот звонит",
s3:"📅 Получаешь встречи",
cta:"Попробуй прямо сейчас",
ctaBtn:"Начать"
},
en:{
title:"AI calls your clients and books meetings",
desc:"Automatically talks and schedules customers",
btn:"Get a call",
how:"How it works",
s1:"📂 Upload contacts",
s2:"🤖 AI calls them",
s3:"📅 Get meetings",
cta:"Try it now",
ctaBtn:"Start"
},
he:{
title:"הבוט מתקשר ללקוחות וקובע פגישות",
desc:"מדבר עם לקוחות באופן אוטומטי",
btn:"קבל שיחה",
how:"איך זה עובד",
s1:"📂 מעלה אנשי קשר",
s2:"🤖 הבוט מתקשר",
s3:"📅 מקבל פגישות",
cta:"נסה עכשיו",
ctaBtn:"התחל"
}
};

function setLang(l){
document.getElementById("title").innerText=t[l].title;
document.getElementById("desc").innerText=t[l].desc;
document.getElementById("btn").innerText=t[l].btn;
document.getElementById("how").innerText=t[l].how;
document.getElementById("s1").innerText=t[l].s1;
document.getElementById("s2").innerText=t[l].s2;
document.getElementById("s3").innerText=t[l].s3;
document.getElementById("cta").innerText=t[l].cta;
document.getElementById("ctaBtn").innerText=t[l].ctaBtn;

document.body.dir = (l==="he")?"rtl":"ltr";
}

setLang("ru");
</script>

</body>
</html>
