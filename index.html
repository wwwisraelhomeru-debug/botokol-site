<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Botokol</title>

<style>
body {
  margin:0;
  font-family:-apple-system, sans-serif;
  color:white;
  overflow-x:hidden;
  background:#050507;
}

/* 🔥 ЖИВОЙ ФОН */
.bg {
  position:fixed;
  width:100%;
  height:100%;
  z-index:-1;
  background: radial-gradient(circle at 20% 20%, #7b5cff33, transparent),
              radial-gradient(circle at 80% 30%, #00e0ff22, transparent),
              radial-gradient(circle at 50% 80%, #ff00aa22, transparent);
}

/* язык */
.lang {
  position:fixed;
  top:20px;
  right:20px;
}

.lang button {
  margin-left:5px;
  padding:8px 12px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

/* hero */
.hero {
  display:flex;
  align-items:center;
  justify-content:center;
  gap:60px;
  padding:120px 20px;
  flex-wrap:wrap;
}

.hero-text {
  max-width:500px;
}

h1 {
  font-size:48px;
}

.sub {
  color:#aaa;
  margin-top:15px;
}

.btn {
  display:inline-block;
  margin-top:25px;
  padding:16px 30px;
  border-radius:14px;
  background: linear-gradient(90deg,#7b5cff,#00e0ff);
  color:white;
  text-decoration:none;
  box-shadow:0 0 30px #7b5cff55;
}

/* 🔥 ФЕЙК UI (как будто продукт уже есть) */
.ui-box {
  background: rgba(255,255,255,0.05);
  border-radius:20px;
  padding:25px;
  width:320px;
  backdrop-filter: blur(15px);
  box-shadow:0 10px 40px rgba(0,0,0,0.4);
}

.call {
  margin-top:15px;
  font-size:14px;
  color:#ddd;
}

/* секции */
.section {
  padding:80px 20px;
  text-align:center;
}

.cards {
  display:flex;
  gap:20px;
  justify-content:center;
  flex-wrap:wrap;
}

.card {
  background: rgba(255,255,255,0.04);
  padding:25px;
  border-radius:15px;
  width:260px;
  backdrop-filter: blur(10px);
  transition:0.3s;
}

.card:hover {
  transform:translateY(-6px);
  border:1px solid #7b5cff;
}

</style>
</head>

<body>

<div class="bg"></div>

<div class="lang">
  <button onclick="setLang('ru')">RU</button>
  <button onclick="setLang('en')">EN</button>
  <button onclick="setLang('he')">HE</button>
</div>

<!-- HERO -->
<div class="hero">

  <div class="hero-text">
    <h1 id="title"></h1>
    <div class="sub" id="subtitle"></div>
    <a href="https://wa.me/972XXXXXXXXX" class="btn" id="cta"></a>
  </div>

  <!-- 🔥 ВИЗУАЛ ПРОДУКТА -->
  <div class="ui-box">
    📞 Звонок активен...

    <div class="call">
      Клиент: Алло?<br><br>
      Botokol: Добрый день, звоню по поводу вашей заявки...<br><br>
      Клиент: Да, удобно сейчас
    </div>
  </div>

</div>

<!-- HOW -->
<div class="section">
  <h2 id="how"></h2>

  <div class="cards">
    <div class="card" id="step1"></div>
    <div class="card" id="step2"></div>
    <div class="card" id="step3"></div>
  </div>
</div>

<!-- VALUE -->
<div class="section">
  <h2 id="value"></h2>

  <div class="cards">
    <div class="card" id="v1"></div>
    <div class="card" id="v2"></div>
    <div class="card" id="v3"></div>
  </div>
</div>

<!-- CTA -->
<div class="section">
  <h2 id="cta2"></h2>
  <a href="https://wa.me/972XXXXXXXXX" class="btn" id="ctaFinal"></a>
</div>

<script>
const content = {

ru:{
dir:"ltr",
title:"Botokol приводит клиентов через звонки",
subtitle:"AI сам звонит, прогревает и назначает встречи",
cta:"Получить клиента",
how:"Как это работает",
step1:"📂 Загружаешь базу",
step2:"🤖 Botokol звонит",
step3:"📅 Получаешь встречи",
value:"Почему Botokol",
v1:"⚡ Работает 24/7",
v2:"📞 Голос как человек",
v3:"💰 Дешевле сотрудников",
cta2:"Попробуй сейчас",
ctaFinal:"Запустить звонок"
},

en:{
dir:"ltr",
title:"Botokol brings clients through AI calls",
subtitle:"AI calls, warms leads and books meetings",
cta:"Get Clients",
how:"How it works",
step1:"📂 Upload contacts",
step2:"🤖 AI calls leads",
step3:"📅 Get meetings",
value:"Why Botokol",
v1:"⚡ Works 24/7",
v2:"📞 Human-like voice",
v3:"💰 Saves money",
cta2:"Try it now",
ctaFinal:"Start Call"
},

he:{
dir:"rtl",
title:"Botokol מביא לקוחות דרך שיחות",
subtitle:"המערכת מתקשרת וקובעת פגישות עבורך",
cta:"קבל לקוחות",
how:"איך זה עובד",
step1:"📂 מעלה רשימה",
step2:"🤖 המערכת מתקשרת",
step3:"📅 מקבל פגישות",
value:"למה Botokol",
v1:"⚡ עובד 24/7",
v2:"📞 קול טבעי",
v3:"💰 חוסך כסף",
cta2:"נסה עכשיו",
ctaFinal:"הפעל שיחה"
}

};

function setLang(lang){
document.body.dir = content[lang].dir;

document.getElementById("title").innerText = content[lang].title;
document.getElementById("subtitle").innerText = content[lang].subtitle;
document.getElementById("cta").innerText = content[lang].cta;
document.getElementById("how").innerText = content[lang].how;
document.getElementById("step1").innerText = content[lang].step1;
document.getElementById("step2").innerText = content[lang].step2;
document.getElementById("step3").innerText = content[lang].step3;
document.getElementById("value").innerText = content[lang].value;
document.getElementById("v1").innerText = content[lang].v1;
document.getElementById("v2").innerText = content[lang].v2;
document.getElementById("v3").innerText = content[lang].v3;
document.getElementById("cta2").innerText = content[lang].cta2;
document.getElementById("ctaFinal").innerText = content[lang].ctaFinal;
}

setLang("ru");
</script>

</body>
</html>
