<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Botokol</title>

<style>
body {
  margin:0;
  font-family:-apple-system, sans-serif;
  color:white;
  background:#050507;
}

/* фон */
.bg {
  position:fixed;
  width:100%;
  height:100%;
  z-index:-1;
  background:
    radial-gradient(circle at 20% 20%, #7b5cff33, transparent),
    radial-gradient(circle at 80% 30%, #00e0ff22, transparent),
    radial-gradient(circle at 50% 80%, #ff00aa22, transparent);
}

/* язык */
.lang {
  position:fixed;
  top:20px;
  right:20px;
}

.lang button {
  margin-left:5px;
  padding:8px 12px;
  border:none;
  border-radius:8px;
}

/* hero */
.hero {
  display:flex;
  align-items:center;
  justify-content:center;
  gap:60px;
  padding:120px 20px;
  flex-wrap:wrap;
}

.hero-text {
  max-width:500px;
}

h1 { font-size:48px; }

.sub {
  color:#aaa;
  margin-top:15px;
}

.btn {
  display:inline-block;
  margin-top:25px;
  padding:16px 30px;
  border-radius:14px;
  background: linear-gradient(90deg,#7b5cff,#00e0ff);
  color:white;
  text-decoration:none;
}

/* картинка */
.hero img {
  width:380px;
  border-radius:20px;
  box-shadow:0 20px 60px rgba(0,0,0,0.5);
}

/* карточки */
.section {
  padding:80px 20px;
  text-align:center;
}

.cards {
  display:flex;
  gap:20px;
  justify-content:center;
  flex-wrap:wrap;
}

.card {
  background: rgba(255,255,255,0.05);
  padding:25px;
  border-radius:15px;
  width:260px;
}

.section img {
  width:300px;
  margin-top:30px;
  border-radius:15px;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="lang">
  <button onclick="setLang('ru')">RU</button>
  <button onclick="setLang('en')">EN</button>
  <button onclick="setLang('he')">HE</button>
</div>

<!-- HERO -->
<div class="hero">

  <div class="hero-text">
    <h1 id="title"></h1>
    <div class="sub" id="subtitle"></div>
    <a href="https://wa.me/972XXXXXXXXX" class="btn" id="cta"></a>
  </div>

  <!-- 🔥 AI картинка -->
  <img src="https://images.unsplash.com/photo-1677442136019-21780ecad995">
</div>

<!-- HOW -->
<div class="section">
  <h2 id="how"></h2>

  <div class="cards">
    <div class="card" id="step1"></div>
    <div class="card" id="step2"></div>
    <div class="card" id="step3"></div>
  </div>

  <!-- визуал процесса -->
  <img src="https://images.unsplash.com/photo-1551288049-bebda4e38f71">
</div>

<!-- VOICE -->
<div class="section">
  <h2>AI Voice Interaction</h2>
  <img src="https://images.unsplash.com/photo-1581090700227-1e8a3d2c2d2d">
</div>

<!-- CTA -->
<div class="section">
  <h2 id="cta2"></h2>
  <a href="https://wa.me/972XXXXXXXXX" class="btn" id="ctaFinal"></a>

  <img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9">
</div>

<script>
const content = {

ru:{
dir:"ltr",
title:"Botokol приводит клиентов через звонки",
subtitle:"AI звонит и назначает встречи",
cta:"Получить клиента",
how:"Как это работает",
step1:"📂 Загружаешь базу",
step2:"🤖 Botokol звонит",
step3:"📅 Получаешь встречи",
cta2:"Попробуй сейчас",
ctaFinal:"Запустить звонок"
},

en:{
dir:"ltr",
title:"Botokol brings clients through AI calls",
subtitle:"AI calls and books meetings",
cta:"Get Clients",
how:"How it works",
step1:"📂 Upload contacts",
step2:"🤖 AI calls",
step3:"📅 Get meetings",
cta2:"Try now",
ctaFinal:"Start Call"
},

he:{
dir:"rtl",
title:"Botokol מביא לקוחות דרך שיחות",
subtitle:"המערכת מתקשרת וקובעת פגישות",
cta:"קבל לקוחות",
how:"איך זה עובד",
step1:"📂 מעלה רשימה",
step2:"🤖 המערכת מתקשרת",
step3:"📅 מקבל פגישות",
cta2:"נסה עכשיו",
ctaFinal:"הפעל שיחה"
}

};

function setLang(lang){
document.body.dir = content[lang].dir;

document.getElementById("title").innerText = content[lang].title;
document.getElementById("subtitle").innerText = content[lang].subtitle;
document.getElementById("cta").innerText = content[lang].cta;
document.getElementById("how").innerText = content[lang].how;
document.getElementById("step1").innerText = content[lang].step1;
document.getElementById("step2").innerText = content[lang].step2;
document.getElementById("step3").innerText = content[lang].step3;
document.getElementById("cta2").innerText = content[lang].cta2;
document.getElementById("ctaFinal").innerText = content[lang].ctaFinal;
}

setLang("ru");
</script>

</body>
</html>
