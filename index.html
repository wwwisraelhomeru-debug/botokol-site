<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Botokol</title>

<style>
body {
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, sans-serif;
  background:#050507;
  color:white;
}

.lang-switch {
  position:fixed;
  top:20px;
  right:20px;
  z-index:10;
}

.lang-switch button {
  margin-left:5px;
  padding:8px 12px;
  border-radius:8px;
  border:none;
  cursor:pointer;
}

.hero {
  text-align:center;
  padding:120px 20px;
  background: radial-gradient(circle at 50% 0%, rgba(123,92,255,0.25), transparent);
}

h1 {
  font-size:52px;
  max-width:900px;
  margin:auto;
}

.gradient {
  background: linear-gradient(90deg,#7b5cff,#00e0ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.sub {
  margin-top:20px;
  color:#aaa;
  font-size:20px;
}

.btn {
  display:inline-block;
  margin-top:30px;
  padding:16px 30px;
  border-radius:14px;
  background: linear-gradient(90deg,#7b5cff,#00e0ff);
  color:white;
  text-decoration:none;
}

.section {
  padding:80px 20px;
  text-align:center;
}

.cards {
  display:flex;
  gap:20px;
  justify-content:center;
  flex-wrap:wrap;
  margin-top:40px;
}

.card {
  background: rgba(255,255,255,0.03);
  padding:25px;
  border-radius:18px;
  width:260px;
}

</style>
</head>

<body>

<div class="lang-switch">
  <button onclick="setLang('ru')">RU</button>
  <button onclick="setLang('en')">EN</button>
  <button onclick="setLang('he')">HE</button>
</div>

<div class="hero">
  <h1 id="title"></h1>
  <div class="sub" id="subtitle"></div>
  <a href="#" class="btn" id="cta"></a>
</div>

<div class="section">
  <h2 id="how"></h2>

  <div class="cards">
    <div class="card" id="step1"></div>
    <div class="card" id="step2"></div>
    <div class="card" id="step3"></div>
  </div>
</div>

<script>
const content = {

  ru: {
    dir: "ltr",
    title: "Botokol закрывает клиентов через звонки",
    subtitle: "AI звонит и назначает встречи за тебя",
    cta: "Получить клиентов",
    how: "Как это работает",
    step1: "📂 Загружаешь контакты",
    step2: "🤖 AI звонит клиентам",
    step3: "📅 Получаешь встречи"
  },

  en: {
    dir: "ltr",
    title: "Botokol closes clients through AI calls",
    subtitle: "AI calls, warms leads and books meetings",
    cta: "Get Clients",
    how: "How it works",
    step1: "📂 Upload contacts",
    step2: "🤖 AI calls leads",
    step3: "📅 Get meetings"
  },

  he: {
    dir: "rtl",
    title: "Botokol סוגר לקוחות עבורך בשיחות",
    subtitle: "AI מתקשר וקובע פגישות במקומך",
    cta: "קבל לקוחות",
    how: "איך זה עובד",
    step1: "📂 מעלה אנשי קשר",
    step2: "🤖 AI מתקשר ללקוחות",
    step3: "📅 מקבל פגישות"
  }

};

function setLang(lang) {
  document.body.dir = content[lang].dir;

  document.getElementById("title").innerText = content[lang].title;
  document.getElementById("subtitle").innerText = content[lang].subtitle;
  document.getElementById("cta").innerText = content[lang].cta;
  document.getElementById("how").innerText = content[lang].how;
  document.getElementById("step1").innerText = content[lang].step1;
  document.getElementById("step2").innerText = content[lang].step2;
  document.getElementById("step3").innerText = content[lang].step3;
}

// старт
setLang("ru");
</script>

</body>
</html>
