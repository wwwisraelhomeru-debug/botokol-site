<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Botokol</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#ffffff;
  color:#111;
  text-align:center;
}

/* язык */
.lang {
  position:fixed;
  top:20px;
  right:20px;
}

.lang button {
  margin-left:5px;
  padding:6px 10px;
  border:1px solid #ccc;
  background:white;
  cursor:pointer;
}

/* hero */
.hero {
  padding:100px 20px;
}

h1 {
  font-size:44px;
  max-width:700px;
  margin:auto;
}

.sub {
  margin-top:20px;
  color:#555;
  font-size:18px;
}

/* кнопка */
.btn {
  display:inline-block;
  margin-top:30px;
  padding:16px 30px;
  background:#ffd400;
  color:black;
  text-decoration:none;
  font-weight:bold;
  border-radius:6px;
}

/* блоки */
.section {
  padding:60px 20px;
}

.cards {
  display:flex;
  justify-content:center;
  gap:30px;
  flex-wrap:wrap;
  margin-top:40px;
}

.card {
  width:220px;
}

/* аудио */
.audio-box {
  margin-top:30px;
}
</style>
</head>

<body>

<div class="lang">
  <button onclick="setLang('ru')">RU</button>
  <button onclick="setLang('en')">EN</button>
  <button onclick="setLang('he')">HE</button>
</div>

<!-- HERO -->
<div class="hero">
  <h1 id="title"></h1>
  <div class="sub" id="subtitle"></div>
  <a href="https://wa.me/972XXXXXXXXX" class="btn" id="cta"></a>
</div>

<!-- FEATURES -->
<div class="section">
  <div class="cards">
    <div class="card" id="f1"></div>
    <div class="card" id="f2"></div>
    <div class="card" id="f3"></div>
  </div>
</div>

<!-- HOW -->
<div class="section">
  <h2 id="how"></h2>

  <div class="cards">
    <div class="card" id="step1"></div>
    <div class="card" id="step2"></div>
    <div class="card" id="step3"></div>
  </div>
</div>

<!-- AUDIO -->
<div class="section">
  <h2 id="listenTitle"></h2>

  <div class="audio-box">
    <button onclick="playAudio()" class="btn" id="playBtn"></button>
    <audio id="audio" src="demo-ru.mp3"></audio>
  </div>
</div>

<!-- CTA -->
<div class="section">
  <h2 id="cta2"></h2>
  <a href="https://wa.me/972XXXXXXXXX" class="btn" id="ctaFinal"></a>
</div>

<script>
const content = {

ru:{
dir:"ltr",
title:"Робот звонит клиентам и приводит тебе встречи",
subtitle:"Botokol автоматически общается и записывает клиентов",
cta:"Получить звонок",
f1:"Работает 24/7",
f2:"Голос как человек",
f3:"Не нужен менеджер",
how:"Как это работает",
step1:"Загружаешь базу",
step2:"Botokol звонит",
step3:"Получаешь встречи",
listenTitle:"Послушай разговор",
play:"▶ Слушать",
cta2:"Попробуй сейчас",
ctaFinal:"Запустить",
audio:"demo-ru.mp3"
},

en:{
dir:"ltr",
title:"AI calls your clients and books meetings for you",
subtitle:"Botokol talks and converts leads automatically",
cta:"Get Clients",
f1:"Works 24/7",
f2:"Human-like voice",
f3:"No sales team needed",
how:"How it works",
step1:"Upload contacts",
step2:"AI calls",
step3:"Get meetings",
listenTitle:"Listen to conversation",
play:"▶ Play",
cta2:"Try now",
ctaFinal:"Start",
audio:"demo-en.mp3"
},

he:{
dir:"rtl",
title:"המערכת מתקשרת ללקוחות ומביאה פגישות",
subtitle:"Botokol מדבר עם הלקוחות וקובע פגישות",
cta:"קבל לקוחות",
f1:"עובד 24/7",
f2:"נשמע כמו אדם",
f3:"בלי אנשי מכירות",
how:"איך זה עובד",
step1:"מעלה רשימה",
step2:"המערכת מתקשרת",
step3:"מקבל פגישות",
listenTitle:"האזן לשיחה",
play:"▶ הפעל",
cta2:"נסה עכשיו",
ctaFinal:"התחל",
audio:"demo-he.mp3"
}

};

function setLang(lang){
document.body.dir = content[lang].dir;

document.getElementById("title").innerText = content[lang].title;
document.getElementById("subtitle").innerText = content[lang].subtitle;
document.getElementById("cta").innerText = content[lang].cta;

document.getElementById("f1").innerText = content[lang].f1;
document.getElementById("f2").innerText = content[lang].f2;
document.getElementById("f3").innerText = content[lang].f3;

document.getElementById("how").innerText = content[lang].how;
document.getElementById("step1").innerText = content[lang].step1;
document.getElementById("step2").innerText = content[lang].step2;
document.getElementById("step3").innerText = content[lang].step3;

document.getElementById("listenTitle").innerText = content[lang].listenTitle;
document.getElementById("playBtn").innerText = content[lang].play;

document.getElementById("cta2").innerText = content[lang].cta2;
document.getElementById("ctaFinal").innerText = content[lang].ctaFinal;

document.getElementById("audio").src = content[lang].audio;
}

function playAudio(){
document.getElementById("audio").play();
}

setLang("ru");
</script>

</body>
</html>
