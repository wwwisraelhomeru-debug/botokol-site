<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Botokol AI</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #ffffff;
  color: #111;
  overflow-x: hidden;
}

/* 🔥 ФОН AI */
.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: -1;
  background:
    radial-gradient(circle at 20% 30%, rgba(255,200,0,0.25), transparent 40%),
    radial-gradient(circle at 80% 60%, rgba(255,150,0,0.2), transparent 40%),
    linear-gradient(120deg, #ffffff 0%, #fff7cc 100%);
}

/* сетка */
.bg::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background-image:
    linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
}

/* HEADER */
.header {
  display: flex;
  justify-content: flex-end;
  padding: 20px;
}

.lang button {
  margin-left: 10px;
  padding: 8px 14px;
  border: 1px solid #ddd;
  background: white;
  cursor: pointer;
  border-radius: 8px;
}

/* HERO */
.hero {
  text-align: center;
  padding: 80px 20px;
}

.hero h1 {
  font-size: 48px;
  font-weight: 800;
  max-width: 800px;
  margin: auto;
}

.hero p {
  margin-top: 20px;
  color: #666;
  font-size: 18px;
}

/* КНОПКА */
.btn {
  margin-top: 30px;
  background: #FFD600;
  border: none;
  padding: 16px 30px;
  font-size: 18px;
  font-weight: bold;
  border-radius: 12px;
  cursor: pointer;
  box-shadow: 0 10px 30px rgba(255, 214, 0, 0.4);
  transition: 0.3s;
}

.btn:hover {
  transform: translateY(-2px);
}

/* БЛОК ЗВОНКА */
.call-box {
  margin: 50px auto;
  max-width: 500px;
  background: #f5f5f5;
  padding: 20px;
  border-radius: 16px;
  text-align: left;
  font-size: 16px;
}

/* КАРТИНКИ */
.ai-img {
  margin-top: 40px;
}

.ai-img img {
  width: 300px;
  border-radius: 20px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.15);
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="header">
  <div class="lang">
    <button onclick="setLang('ru')">RU</button>
    <button onclick="setLang('en')">EN</button>
    <button onclick="setLang('he')">HE</button>
  </div>
</div>

<div class="hero">
  <h1 id="title"></h1>
  <p id="desc"></p>

  <button class="btn" id="btn"></button>

  <div class="call-box">
    📞 Call in progress...<br><br>
    Client: Hello?<br>
    Bot: Hi, I’m calling about your request...
  </div>

  <!-- 🔥 КАРТИНКА -->
  <div class="ai-img">
    <img src="https://images.unsplash.com/photo-1677442135136-760c813028c0" alt="AI">
  </div>
</div>

<script>
const translations = {
  ru: {
    title: "Робот звонит клиентам и приводит тебе встречи",
    desc: "Botokol автоматически общается и записывает клиентов",
    btn: "Получить звонок"
  },
  en: {
    title: "AI calls your clients and books meetings for you",
    desc: "Botokol automatically talks and schedules customers",
    btn: "Get a call"
  },
  he: {
    title: "הבוט מתקשר ללקוחות וקובע פגישות עבורך",
    desc: "Botokol מדבר עם לקוחות באופן אוטומטי",
    btn: "קבל שיחה"
  }
};

function setLang(lang) {
  document.getElementById("title").innerText = translations[lang].title;
  document.getElementById("desc").innerText = translations[lang].desc;
  document.getElementById("btn").innerText = translations[lang].btn;

  if(lang === "he") {
    document.body.dir = "rtl";
  } else {
    document.body.dir = "ltr";
  }
}

setLang("ru");
</script>

</body>
</html>
