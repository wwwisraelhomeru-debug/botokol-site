<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Botokol</title>

<style>
body {
  margin:0;
  font-family:-apple-system, sans-serif;
  background:#050507;
  color:white;
  text-align:center;
}

/* фон */
.bg {
  position:fixed;
  width:100%;
  height:100%;
  z-index:-1;
  background:
    radial-gradient(circle at 20% 20%, #7b5cff33, transparent),
    radial-gradient(circle at 80% 30%, #00e0ff22, transparent),
    radial-gradient(circle at 50% 80%, #ff00aa22, transparent);
}

/* язык */
.lang {
  position:fixed;
  top:20px;
  right:20px;
}

.lang button {
  margin-left:5px;
  padding:8px 12px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

/* hero */
.hero {
  padding:120px 20px;
}

h1 {
  font-size:48px;
  max-width:800px;
  margin:auto;
}

.sub {
  color:#aaa;
  margin-top:20px;
  font-size:20px;
}

.btn {
  display:inline-block;
  margin-top:25px;
  padding:16px 30px;
  border-radius:14px;
  background: linear-gradient(90deg,#7b5cff,#00e0ff);
  color:white;
  text-decoration:none;
}

/* карточки */
.section {
  padding:80px 20px;
}

.cards {
  display:flex;
  gap:20px;
  justify-content:center;
  flex-wrap:wrap;
}

.card {
  background:#111;
  padding:25px;
  border-radius:15px;
  width:260px;
}

/* аудио */
.audio-box {
  margin-top:30px;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="lang">
  <button onclick="setLang('ru')">RU</button>
  <button onclick="setLang('en')">EN</button>
  <button onclick="setLang('he')">HE</button>
</div>

<!-- HERO -->
<div class="hero">
  <h1 id="title"></h1>
  <div class="sub" id="subtitle"></div>
  <a href="https://wa.me/972XXXXXXXXX" class="btn" id="cta"></a>
</div>

<!-- FEATURES -->
<div class="section">
  <div class="cards">
    <div class="card" id="f1"></div>
    <div class="card" id="f2"></div>
    <div class="card" id="f3"></div>
    <div class="card" id="f4"></div>
  </div>
</div>

<!-- HOW -->
<div class="section">
  <h2 id="how"></h2>

  <div class="cards">
    <div class="card" id="step1"></div>
    <div class="card" id="step2"></div>
    <div class="card" id="step3"></div>
  </div>
</div>

<!-- AUDIO DEMO -->
<div class="section">
  <h2 id="listenTitle"></h2>

  <div class="audio-box">
    <button onclick="playAudio()" class="btn" id="playBtn"></button>
    <audio id="audio" src="demo-ru.mp3"></audio>
  </div>
</div>

<!-- CTA -->
<div class="section">
  <h2 id="cta2"></h2>
  <a href="https://wa.me/972XXXXXXXXX" class="btn" id="ctaFinal"></a>
</div>

<script>
const content = {

ru:{
dir:"ltr",
title:"Botokol приводит клиентов через звонки — без менеджеров",
subtitle:"AI звонит, прогревает и назначает встречи",
cta:"Получить клиента",
f1:"⚡ Работает 24/7",
f2:"📞 Неотличим от человека",
f3:"💰 В 3 раза дешевле",
f4:"🚀 Массовые звонки",
how:"Как это работает",
step1:"📂 Загружаешь базу",
step2:"🤖 Botokol звонит",
step3:"📅 Получаешь встречи",
listenTitle:"Послушай как бот разговаривает",
play:"▶ Слушать",
cta2:"Попробуй сейчас",
ctaFinal:"Запустить звонок",
audio:"demo-ru.mp3"
},

en:{
dir:"ltr",
title:"Botokol brings clients through AI calls",
subtitle:"AI calls and books meetings",
cta:"Get Clients",
f1:"⚡ Works 24/7",
f2:"📞 Human-like voice",
f3:"💰 3x cheaper",
f4:"🚀 Mass calling",
how:"How it works",
step1:"📂 Upload contacts",
step2:"🤖 AI calls",
step3:"📅 Get meetings",
listenTitle:"Listen to AI conversation",
play:"▶ Play demo",
cta2:"Try now",
ctaFinal:"Start Call",
audio:"demo-en.mp3"
},

he:{
dir:"rtl",
title:"Botokol מביא לקוחות דרך שיחות",
subtitle:"המערכת מתקשרת וקובעת פגישות",
cta:"קבל לקוחות",
f1:"⚡ עובד 24/7",
f2:"📞 נשמע כמו אדם",
f3:"💰 זול פי 3",
f4:"🚀 שיחות בכמות גדולה",
how:"איך זה עובד",
step1:"📂 מעלה רשימה",
step2:"🤖 המערכת מתקשרת",
step3:"📅 מקבל פגישות",
listenTitle:"האזן לשיחה של הבוט",
play:"▶ הפעל",
cta2:"נסה עכשיו",
ctaFinal:"הפעל שיחה",
audio:"demo-he.mp3"
}

};

function setLang(lang){
document.body.dir = content[lang].dir;

document.getElementById("title").innerText = content[lang].title;
document.getElementById("subtitle").innerText = content[lang].subtitle;
document.getElementById("cta").innerText = content[lang].cta;

document.getElementById("f1").innerText = content[lang].f1;
document.getElementById("f2").innerText = content[lang].f2;
document.getElementById("f3").innerText = content[lang].f3;
document.getElementById("f4").innerText = content[lang].f4;

document.getElementById("how").innerText = content[lang].how;
document.getElementById("step1").innerText = content[lang].step1;
document.getElementById("step2").innerText = content[lang].step2;
document.getElementById("step3").innerText = content[lang].step3;

document.getElementById("listenTitle").innerText = content[lang].listenTitle;
document.getElementById("playBtn").innerText = content[lang].play;

document.getElementById("cta2").innerText = content[lang].cta2;
document.getElementById("ctaFinal").innerText = content[lang].ctaFinal;

document.getElementById("audio").src = content[lang].audio;
}

function playAudio(){
document.getElementById("audio").play();
}

setLang("ru");
</script>

</body>
</html>
