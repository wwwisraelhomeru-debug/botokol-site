<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Botokol</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0b0f;
      color: white;
      text-align: center;
    }

    .container {
      max-width: 1000px;
      margin: auto;
      padding: 60px 20px;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 20px;
    }

    h2 {
      margin-top: 40px;
    }

    p {
      color: #aaa;
      font-size: 18px;
    }

    .btn {
      padding: 15px 25px;
      border-radius: 12px;
      border: none;
      background: #7b5cff;
      color: white;
      font-size: 16px;
      cursor: pointer;
      margin-top: 20px;
    }

    .steps {
      display: flex;
      gap: 20px;
      margin-top: 40px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .card {
      background: #111;
      padding: 20px;
      border-radius: 15px;
      min-width: 250px;
    }

    input {
      padding: 15px;
      border-radius: 10px;
      border: none;
      width: 260px;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<!-- HERO -->
<div class="container">
  <h1>Botokol звонит клиентам и назначает встречи за тебя</h1>
  <p>Загрузи контакты — наш AI сам позвонит и приведёт тебе клиентов</p>
  <button class="btn">Получить звонок</button>
</div>

<!-- HOW IT WORKS -->
<div class="container">
  <h2>Как это работает</h2>
  <div class="steps">
    <div class="card">📂 Загружаешь контакты</div>
    <div class="card">🤖 Botokol звонит клиентам</div>
    <div class="card">📅 Получаешь встречи</div>
  </div>
</div>

<!-- CTA -->
<div class="container">
  <h2>Попробуй прямо сейчас</h2>
  <p>Введи номер — робот позвонит тебе</p>
  <input placeholder="Твой номер телефона">
  <br>
  <button class="btn">Позвонить мне</button>
</div>

</body>
</html>
